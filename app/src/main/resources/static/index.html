<!-- defineRole.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinic Management System</title>
  <link rel="icon" type="image/png" href="./assets/images/logo/logo.png" />

  <link rel="stylesheet" href="./assets/css/index.css" />
  <link rel="stylesheet" href="./assets/css/style.css" />

  <script src="./js/util.js" defer></script>
  <script src="./js/render.js" defer></script>
  <script src="./js/components/header.js" defer></script>
  <script src="./js/components/footer.js" defer></script>
  <script type="module" src="./js/services/index.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>

      <main class="main-content">
        <div class="role-box">
          <h2>Select Your Role</h2>

          <div class="role-buttons">
            <button id="adminLogin" class="adminBtn">Admin</button>
            <button id="doctorLogin" class="adminBtn">Doctor</button>
            <button id="patientRoleBtn" onclick="selectRole('patient')">Patient</button>
          </div>
        </div>
      </main>

      <div id="footer"></div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeModal">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>
</body>
</html>
